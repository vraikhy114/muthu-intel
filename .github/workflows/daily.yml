name: MGM Muthu Daily Intelligence

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run collector
        run: python collector.py

      - name: Commit updated dashboard
        run: |
          git config user.name "Muthu Intel Bot"
          git config user.email "actions@github.com"
          git add dashboard_standalone.html dashboard_data.json competitor_snapshot.json
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d %H:%M UTC')"
          git push
