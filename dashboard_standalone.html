<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGM Muthu — Morning Intelligence</title>
<style>
:root{
  --bg0:#16161a;--bg1:#1e1e24;--bg2:#26262e;--bg3:#2e2e38;--bg4:#363642;
  --border:#ffffff12;--border2:#ffffff1f;--border3:#ffffff30;
  --t1:#f0efe8;--t2:#b8b7b0;--t3:#78776e;--t4:#4a4944;
  --blue:#4a9eff;--blue-dim:#1a3a5c;--blue-text:#a8d4ff;
  --teal:#3dd68c;--teal-dim:#0d3320;--teal-text:#7eeebb;
  --amber:#f5a623;--amber-dim:#3d2800;--amber-text:#ffc966;
  --coral:#ff6b4a;--coral-dim:#3d1a0e;--coral-text:#ffaa94;
  --purple:#9b8afb;--purple-dim:#1e1650;--purple-text:#c4b8ff;
  --green:#6abf45;--green-dim:#1a2e0a;--green-text:#a8e07a;
  --pink:#f472b6;--pink-dim:#3d0f2a;--pink-text:#f9a8d4;
  --red:#f87171;--red-dim:#3d1010;--red-text:#fca5a5;
  --own:#4a9eff;--own-dim:#0d2040;--own-text:#a8d4ff;
  --r:7px;--rl:11px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;font-size:13px}

/* TOP BAR */
.topbar{background:var(--bg1);border-bottom:1px solid var(--border2);padding:0 18px;height:50px;display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#1a6fff,#0a4bbf);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;letter-spacing:-0.5px}
.topbar-title{font-size:14px;font-weight:700;color:var(--t1)}
.topbar-sub{font-size:11px;color:var(--t3);margin-left:2px}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;border-radius:20px;padding:4px 10px;border:1px solid var(--border2);color:var(--t3);background:var(--bg2)}
.chip.live{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-dim)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* SUMMARY STRIP */
.sumstrip{background:var(--bg1);border-bottom:1px solid var(--border2);display:grid;grid-template-columns:repeat(7,1fr)}
.sumcell{padding:10px 14px;text-align:center;border-right:1px solid var(--border)}
.sumcell:last-child{border-right:none}
.sumval{font-size:22px;font-weight:800;color:var(--t1);line-height:1}
.sumval.hi{color:var(--teal)}
.sumval.warn{color:var(--amber)}
.sumval.alert{color:var(--red)}
.sumval.blue{color:var(--blue)}
.sumlbl{font-size:10px;color:var(--t3);margin-top:3px;line-height:1.3}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin:1px}
.panel{background:var(--bg1);padding:13px 15px}
.panel-full{grid-column:1/-1;border-top:2px solid var(--blue)}

/* PANEL HEAD */
.phead{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border2)}
.picon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ptitle{font-size:12px;font-weight:700;color:var(--t1);flex:1;letter-spacing:.01em}
.pbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}

/* MUTHU INNER GRID */
.muthu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0 18px}

/* NEWS LIST */
.nl{list-style:none}
.ni{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);line-height:1.45}
.ni:last-child{border-bottom:none}
.nd{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.nd-new{background:var(--teal)}
.nd-info{background:var(--blue)}
.nd-warn{background:var(--amber)}
.nd-alert{background:var(--red);box-shadow:0 0 6px var(--red)}
.ni-txt{flex:1;font-size:11.5px;color:var(--t2);line-height:1.45}
.ni-txt b{color:var(--t1);font-weight:600}
.ni-src{font-size:10px;color:var(--t4);white-space:nowrap;flex-shrink:0;margin-left:2px}
.ext-link{color:var(--blue);text-decoration:none;flex-shrink:0;display:inline-flex;align-items:center;margin-left:4px;opacity:.7;transition:opacity .15s}
.ext-link:hover{opacity:1}
.pill{font-size:10px;padding:1px 6px;border-radius:20px;display:inline;margin-left:4px;font-weight:600}
.pill-new{background:var(--teal-dim);color:var(--teal-text)}
.pill-chg{background:var(--amber-dim);color:var(--amber-text)}
.pill-alert{background:var(--red-dim);color:var(--red-text)}
.pill-own{background:var(--own-dim);color:var(--own-text)}

/* CURRENCY */
.ccy-row{display:flex;gap:8px;margin-bottom:9px}
.ccy{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;flex:1}
.ccy-pair{font-size:10px;color:var(--t3);margin-bottom:2px}
.ccy-val{font-size:18px;font-weight:800;color:var(--t1)}
.ccy-delta{font-size:10px;font-weight:700}
.up{color:var(--teal)}.dn{color:var(--red)}

/* TRENDS */
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px}
.tdest{font-size:10px;color:var(--t3);margin-bottom:3px}
.tval{font-size:11px;font-weight:700;margin-bottom:5px}
.tbar-wrap{background:var(--bg4);border-radius:20px;height:3px;overflow:hidden}
.tbar{height:3px;border-radius:20px;background:var(--blue);transition:width .6s ease}
.tbar.low{background:var(--amber)}

/* ICON + BADGE COLOUR CLASSES */
.ic-blue{background:var(--blue-dim);color:var(--blue-text)}
.ic-teal{background:var(--teal-dim);color:var(--teal-text)}
.ic-amber{background:var(--amber-dim);color:var(--amber-text)}
.ic-coral{background:var(--coral-dim);color:var(--coral-text)}
.ic-purple{background:var(--purple-dim);color:var(--purple-text)}
.ic-green{background:var(--green-dim);color:var(--green-text)}
.ic-pink{background:var(--pink-dim);color:var(--pink-text)}
.ic-red{background:var(--red-dim);color:var(--red-text)}
.ic-own{background:#0d2a50;color:var(--own-text)}
.bg-blue{background:var(--blue-dim);color:var(--blue-text)}
.bg-teal{background:var(--teal-dim);color:var(--teal-text)}
.bg-amber{background:var(--amber-dim);color:var(--amber-text)}
.bg-coral{background:var(--coral-dim);color:var(--coral-text)}
.bg-purple{background:var(--purple-dim);color:var(--purple-text)}
.bg-green{background:var(--green-dim);color:var(--green-text)}
.bg-pink{background:var(--pink-dim);color:var(--pink-text)}
.bg-red{background:var(--red-dim);color:var(--red-text)}
.bg-own{background:var(--own-dim);color:var(--own-text)}

/* SECTION DIVIDERS within panel */
.sect-sep{border-top:1px solid var(--border2);margin:8px 0}

/* FOOTER */
.footer{background:var(--bg1);border-top:1px solid var(--border2);padding:8px 18px;display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t4)}
.footer-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
#loading .logo-big{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#1a6fff,#0a4bbf);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;letter-spacing:-1px}
#loading p{font-size:13px;color:var(--t3)}
#loading.hidden{display:none}

/* ALERT FLASH */
.panel-alert-border{border-top:2px solid var(--red)}
</style>
</head>

</div>

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}
function dotCls(d){return d==='new'?'nd nd-new':d==='warn'?'nd nd-warn':d==='alert'?'nd nd-alert':'nd nd-info'}

function newsItem(item){
  const li=el('li','ni');
  li.appendChild(el('span',dotCls(item.dot||'info')));
  const txt=el('span','ni-txt');
  txt.textContent=item.title||'';
  li.appendChild(txt);
  if(item.age){
    li.appendChild(el('span','ni-src',item.age));
  } else if(item.source&&item.source!=='Google News'&&item.source!=='Aggregated'){
    li.appendChild(el('span','ni-src',item.source));
  }
  if(item.link&&item.link!=='#'){
    const a=document.createElement('a');
    a.className='ext-link';
    a.href=item.link;
    a.target='_blank';
    a.rel='noopener noreferrer';
    a.title='Open source';
    a.innerHTML=ICONS.extlink;
    li.appendChild(a);
  }
  return li;
}

function phead(icon,title,badge,icCls,bgCls){
  const h=el('div','phead');
  h.innerHTML=`<div class="picon ${icCls}">${ICONS[icon]||''}</div><span class="ptitle">${title}</span><span class="pbadge ${bgCls}">${badge}</span>`;
  return h;
}

function renderSummary(s,currency){
  const gbp=currency.find(c=>c.pair==='GBP / EUR');
  const cells=[
    {v:s.total_stories,l:'Stories today',c:''},
    {v:s.muthu_mentions,l:'MGM Muthu mentions',c:'hi'},
    {v:s.competitor_changes,l:'Competitor changes',c:'warn'},
    {v:s.new_routes,l:'New flight routes',c:'blue'},
    {v:s.events,l:'Events this week',c:''},
    {v:gbp?gbp.val:'—',l:'GBP / EUR live',c:'blue'},
    {v:s.weather_alerts,l:'Weather alerts',c:s.weather_alerts>0?'alert':''},
  ];
  const strip=document.getElementById('sumstrip');
  cells.forEach(c=>{
    const cell=el('div','sumcell');
    cell.innerHTML=`<div class="sumval ${c.c}">${c.v}</div><div class="sumlbl">${c.l}</div>`;
    strip.appendChild(cell);
  });
}

function renderMuthu(items){
  const p=el('div','panel panel-full');
  p.appendChild(phead('building','MGM Muthu Hotels — brand mentions &amp; news worldwide',`${items.length} mentions today`,'ic-own','bg-own'));
  const g=el('div','muthu-grid');
  const cols=[[],[],[]];
  items.forEach((item,i)=>cols[i%3].push(item));
  cols.forEach(col=>{const ul=el('ul','nl');col.forEach(item=>ul.appendChild(newsItem(item)));g.appendChild(ul);});
  p.appendChild(g);
  return p;
}

function newsPanel(icon,title,badge,icCls,bgCls,items,extraCls){
  const p=el('div','panel'+(extraCls?' '+extraCls:''));
  p.appendChild(phead(icon,title,badge,icCls,bgCls));
  const ul=el('ul','nl');
  (items||[]).forEach(item=>ul.appendChild(newsItem(item)));
  p.appendChild(ul);
  return p;
}

function currencyPanel(currency,macroItems){
  const p=el('div','panel');
  p.appendChild(phead('coin','Macro &amp; consumer confidence','markets','ic-green','bg-green'));
  const row=el('div','ccy-row');
  currency.forEach(c=>{
    const card=el('div','ccy');
    const dc=c.dir==='up'?'up':c.dir==='down'?'dn':'';
    card.innerHTML=`<div class="ccy-pair">${c.pair}</div><div class="ccy-val">${c.val}</div><div class="ccy-delta ${dc}">${c.delta||''}</div>`;
    row.appendChild(card);
  });
  p.appendChild(row);
  const ul=el('ul','nl');
  (macroItems||[]).forEach(item=>ul.appendChild(newsItem(item)));
  p.appendChild(ul);
  return p;
}

function trendsPanel(trends){
  const p=el('div','panel');
  p.appendChild(phead('trending','Search demand signals — article links','7 days','ic-teal','bg-teal'));
  const ul=el('ul','nl');
  (trends||[]).forEach(t=>{
    // Destination header row
    const header=el('li','ni');
    header.style.cssText='padding:6px 0 2px;border-bottom:none';
    const low=t.bar<35;
    header.innerHTML=`<span class="nd ${low?'nd-warn':'nd-new'}" style="margin-top:5px"></span><span class="ni-txt" style="font-weight:600;color:var(--t1)">${t.dest}</span><span class="ni-src">${t.articles_24h} articles this week</span>`;
    ul.appendChild(header);
    // Real article links
    if(t.articles&&t.articles.length){
      t.articles.forEach(a=>{
        const li=el('li','ni');
        li.style.cssText='padding-left:13px';
        const txt=el('span','ni-txt');
        txt.textContent=a.title||'';
        li.appendChild(el('span','nd nd-info'));
        li.appendChild(txt);
        if(a.age) li.appendChild(el('span','ni-src',a.age));
        if(a.link&&a.link!=='#'){
          const a2=document.createElement('a');
          a2.className='ext-link';a2.href=a.link;a2.target='_blank';a2.rel='noopener noreferrer';
          a2.innerHTML=ICONS.extlink;
          li.appendChild(a2);
        }
        ul.appendChild(li);
      });
    } else {
      const li=el('li','ni');
      li.style.cssText='padding-left:13px';
      li.innerHTML=`<span class="nd nd-info"></span><span class="ni-txt" style="color:var(--t3);font-style:italic">No articles in last 7 days</span>`;
      ul.appendChild(li);
    }
  });
  p.appendChild(ul);
  return p;
}

function init(){
  const data=EMBEDDED_DATA;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display='';

  document.getElementById('date-chip').textContent=data.date_label||'';
  document.getElementById('time-chip').textContent='Updated '+(data.generated||'').slice(11,16);
  document.getElementById('footer-text').textContent='Sources: Google News RSS · Competitor crawler · frankfurter.app · AccuWeather · TripAdvisor · Booking.com · Google Reviews · Generated: '+(data.generated||'').slice(0,16).replace('T',' ');
  document.getElementById('footer-refresh').textContent='Next refresh: tomorrow 07:00';

  renderSummary(data.summary||{},data.currency||[]);

  const grid=document.getElementById('grid');
  grid.appendChild(renderMuthu(data.muthu||[]));
  grid.appendChild(newsPanel('news','Industry &amp; hotel news',`${(data.industry||[]).length} stories`,'ic-blue','bg-blue',data.industry));
  grid.appendChild(newsPanel('tag','Competitor offers &amp; pricing',`${(data.competitors||[]).length} tracked`,'ic-teal','bg-teal',data.competitors));
  grid.appendChild(newsPanel('plane','Airline &amp; airport',`${(data.airline||[]).length} stories`,'ic-purple','bg-purple',data.airline));
  grid.appendChild(newsPanel('chart','Tourism statistics','by destination','ic-amber','bg-amber',data.tourism));
  grid.appendChild(newsPanel('store','Tour operators &amp; OTA signals',`${(data.operators||[]).length} signals`,'ic-coral','bg-coral',data.operators));
  grid.appendChild(currencyPanel(data.currency||[],data.macro||[]));
  grid.appendChild(newsPanel('calendar','Events &amp; demand calendar',`${(data.events||[]).length} upcoming`,'ic-pink','bg-pink',data.events));
  grid.appendChild(trendsPanel(data.trends||[]));
  grid.appendChild(newsPanel('cloud','Weather &amp; destination alerts',`${(data.weather||[]).length} destinations`,'ic-red','bg-red',data.weather,'panel-alert-border'));
  grid.appendChild(newsPanel('star','Reputation &amp; review signals','monitored','ic-amber','bg-amber',data.reputation));
}

init();
